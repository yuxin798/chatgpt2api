services:
  - type: web
    name: chatgpt2api
    runtime: python
    plan: free
    buildCommand: bash scripts/render_build.sh
    startCommand: uv run --no-sync uvicorn main:app --host 0.0.0.0 --port $PORT --access-log
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "22.22.0"
      - key: CHATGPT2API_AUTH_KEY
        sync: false
      - key: REGISTER_MAIL_PROVIDER
        value: moemail
      - key: MOEMAIL_API_BASE
        value: https://moemail.app
      - key: MOEMAIL_API_KEY
        sync: false
      - key: MOEMAIL_DOMAIN
        sync: false
      - key: STORAGE_BACKEND
        value: json
